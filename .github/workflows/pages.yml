name: Deploy dashboard to GitHub Pages

# Rebuilds the model from fresh data and publishes the static dashboard.
# Runs on every push to main and once a day, so predictions and the track
# record stay current through the tournament.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python data/ingest.py        # pull latest results -> data/matches.parquet
      - run: python scripts/train.py       # refit + write static/data/*.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
