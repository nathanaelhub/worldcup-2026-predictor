name: Deploy dashboard to GitHub Pages

# Rebuilds the model from fresh data and publishes the static dashboard.
# Runs on every push to main and once a day, so predictions and the track
# record stay current through the tournament.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q           # bad model math should fail the build, not deploy
      - run: python data/ingest.py        # pull latest results -> data/matches.parquet
      - run: python scripts/train.py       # refit + write static/data/*.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # deploy-pages intermittently 500s ("Deployment failed, try again later")
      # — took out 2 of the last 3 runs, so retry once before failing the job
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
